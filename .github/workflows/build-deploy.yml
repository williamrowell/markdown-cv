name: Build and Deploy CV

on:
  push:
    branches: [master]
    paths:
      - 'index.md'
      - '_bibliography/**'
      - '_layouts/**'
      - 'media/**'
      - '_config.yml'
      - 'Gemfile'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm install -g playwright
          npx playwright install chromium

      - name: Build Jekyll
        run: bundle exec jekyll build

      - name: Generate PDFs
        run: |
          # Create CV HTML variant (shows all bibliography sections in print)
          sed 's/davewhipp-print\.css/davewhipp-cv-print.css/' \
            _site/index.html > _site/index-cv.html

          # Serve the built site over HTTP so CDN fonts (Font Awesome,
          # Academicons) load correctly — they are blocked on file:// URLs
          python3 -m http.server 4000 --directory _site &
          SERVER_PID=$!
          until curl -s http://localhost:4000/ > /dev/null; do sleep 0.5; done

          # Generate PDFs with Playwright:
          #   - displayHeaderFooter: false  → no date/title/URL/page-number chrome
          #   - waitUntil: networkidle      → wait for CDN fonts to finish loading
          #   - macos runner                → Avenir font available, correct metrics
          node - <<'EOF'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const pdfOpts = {
              format: 'Letter',
              printBackground: false,
              displayHeaderFooter: false,
              margin: { top: '0.5in', right: '0.5in', bottom: '0.5in', left: '0.5in' }
            };

            const resumePage = await browser.newPage();
            await resumePage.goto('http://localhost:4000/', { waitUntil: 'networkidle' });
            await resumePage.pdf({ path: 'resume.pdf', ...pdfOpts });

            const cvPage = await browser.newPage();
            await cvPage.goto('http://localhost:4000/index-cv.html', { waitUntil: 'networkidle' });
            await cvPage.pdf({ path: 'cv.pdf', ...pdfOpts });

            await browser.close();
          })();
          EOF

          kill $SERVER_PID

      - name: Push to WebDAV
        env:
          WEBDAV_USER: ${{ secrets.WEBDAV_USER }}
          WEBDAV_PASS: ${{ secrets.WEBDAV_PASS }}
          WEBDAV_URL: ${{ secrets.WEBDAV_URL }}
        run: |
          # Ensure _bibliography/ directory exists on server
          curl -sf -u "$WEBDAV_USER:$WEBDAV_PASS" \
            -X MKCOL "$WEBDAV_URL/_bibliography/" || true

          # Upload HTML and PDFs
          curl -sf -u "$WEBDAV_USER:$WEBDAV_PASS" \
            -T _site/index.html "$WEBDAV_URL/index.html"
          curl -sf -u "$WEBDAV_USER:$WEBDAV_PASS" \
            -T resume.pdf "$WEBDAV_URL/resume.pdf"
          curl -sf -u "$WEBDAV_USER:$WEBDAV_PASS" \
            -T cv.pdf "$WEBDAV_URL/cv.pdf"

          # Upload bib files
          for f in _bibliography/*.bib; do
            curl -sf -u "$WEBDAV_USER:$WEBDAV_PASS" \
              -T "$f" "$WEBDAV_URL/_bibliography/$(basename "$f")"
          done
